<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Acesso administrativo — geradorxml</title>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:#0a0a0a;color:#e2e8f0;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:1rem;
    }
    a{color:#f59e0b;text-decoration:none}
    a:hover{text-decoration:underline}

    .card{
      width:100%;max-width:420px;
      background:#111111;border:1px solid #292524;
      border-radius:1.25rem;padding:2.5rem 2rem;
    }

    .logo{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
    .logo-ico{
      width:2.5rem;height:2.5rem;background:#f59e0b;
      border-radius:.625rem;display:flex;align-items:center;
      justify-content:center;font-weight:700;font-size:1rem;color:#0a0a0a;
    }
    .logo-name{font-size:1.1rem;font-weight:700;color:#fff}
    .logo-sub{font-size:.7rem;color:#78716c;margin-top:.1rem}

    .badge{
      display:inline-flex;align-items:center;gap:.4rem;
      background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
      color:#fbbf24;font-size:.7rem;font-weight:600;text-transform:uppercase;
      letter-spacing:.05em;padding:.3rem .7rem;border-radius:.5rem;margin-bottom:1.5rem;
    }

    h1{font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:.4rem}
    .subtitle{font-size:.85rem;color:#78716c;margin-bottom:2rem}

    label{display:block;font-size:.75rem;font-weight:500;color:#a8a29e;margin-bottom:.35rem}
    input{
      width:100%;background:#0a0a0a;border:1px solid #292524;
      border-radius:.625rem;padding:.625rem .875rem;font-size:.875rem;
      color:#e2e8f0;outline:none;transition:.15s;
    }
    input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
    .field{margin-bottom:1.1rem}

    .btn{
      width:100%;background:#f59e0b;color:#0a0a0a;font-weight:700;
      font-size:.9rem;padding:.75rem;border:none;border-radius:.75rem;
      cursor:pointer;transition:.15s;display:flex;align-items:center;
      justify-content:center;gap:.5rem;
    }
    .btn:hover{background:#d97706}
    .btn:disabled{background:#292524;color:#78716c;cursor:not-allowed}

    .err{
      background:#2a0a0a;border:1px solid #7f1d1d;color:#fca5a5;
      border-radius:.625rem;padding:.75rem 1rem;font-size:.82rem;
      margin-bottom:1rem;display:none;
    }
    .err.show{display:block}

    .footer-txt{text-align:center;font-size:.8rem;color:#57534e;margin-top:1.5rem}
    .spin{animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-ico">GX</div>
    <div>
      <div class="logo-name">geradorxml</div>
      <div class="logo-sub">Painel administrativo</div>
    </div>
  </div>

  <span class="badge">⚙ Acesso restrito · Super Admin</span>

  <h1>Entrar como administrador</h1>
  <p class="subtitle">Esta área é exclusiva para a equipe gestora da plataforma.</p>

  <div id="err" class="err"></div>

  <form id="form">
    <div class="field">
      <label for="email">E-mail administrativo</label>
      <input id="email" type="email" placeholder="admin@geradorxml.com.br"
             autocomplete="email" required/>
    </div>
    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="••••••••"
             autocomplete="current-password" required/>
    </div>

    <button id="btn" type="submit" class="btn">
      <svg id="ico" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <span id="btn-txt">Entrar no painel</span>
    </button>
  </form>

  <p class="footer-txt">
    É um cliente/assinante? <a href="/login">Acesse sua conta aqui →</a>
  </p>
</div>

<script>
const TOKEN_KEY = 'gxml_token';
const USER_KEY  = 'gxml_user';

// If already authenticated AND admin, skip straight to the panel.
// If authenticated as a non-admin, do NOT redirect into /admin — let them
// see this page (and the message below clarifies this area is restricted).
(function checkExisting() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) return;
  try {
    const cached = JSON.parse(localStorage.getItem(USER_KEY) || '{}');
    if (cached && cached.is_admin) {
      window.location.replace('/admin');
    }
  } catch (e) {}
})();

const form   = document.getElementById('form');
const btn    = document.getElementById('btn');
const btnTxt = document.getElementById('btn-txt');
const ico    = document.getElementById('ico');
const errEl  = document.getElementById('err');

function showErr(msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
}
function hideErr() { errEl.classList.remove('show'); }

function setLoading(on) {
  btn.disabled = on;
  btnTxt.textContent = on ? 'Verificando…' : 'Entrar no painel';
  ico.innerHTML = on
    ? '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity=".25"/><path fill="currentColor" opacity=".75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>'
    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>';
  if (on) ico.classList.add('spin'); else ico.classList.remove('spin');
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  hideErr();
  setLoading(true);

  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });

    const data = await resp.json();

    if (!resp.ok) {
      showErr(data.error || 'Erro ao entrar. Tente novamente.');
      return;
    }

    if (!data.user || !data.user.is_admin) {
      // Valid credentials, but not an admin account — refuse access here.
      showErr('Esta conta não tem permissão de administrador. Use a página de login de clientes.');
      return;
    }

    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
    window.location.replace('/admin');

  } catch (err) {
    showErr('Erro de conexão. Verifique sua internet e tente novamente.');
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
